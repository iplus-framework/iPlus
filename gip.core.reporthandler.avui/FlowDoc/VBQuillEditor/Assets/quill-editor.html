<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quill Editor</title>
    <link href="quill.snow.css" rel="stylesheet">
    <link href="quill-table-better.css" rel="stylesheet">
    <style>
        :root {
            color-scheme: light !important;
        }
        html {
            background: #ffffff !important;
            color: #000000 !important;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            overflow: hidden;
            background: #ffffff !important;
            color: #000000 !important;
            caret-color: #000000 !important;
        }
        #container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #ffffff !important;
        }
        #toolbar-container {
            flex-shrink: 0;
            border-bottom: 1px solid #ccc;
        }
        #editor-container {
            flex-grow: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #ffffff !important;
            position: relative;
        }
        #editor {
            flex: 1 1 auto;
            min-height: 0;
            background: #ffffff !important;
            height: 100%;
        }
        .ql-toolbar {
            border-top: none !important;
            border-left: none !important;
            border-right: none !important;
            border-radius: 0 !important;
        }
        .ql-container {
            border-bottom: none !important;
            border-left: none !important;
            border-right: none !important;
            border-radius: 0 !important;
            font-size: 14px;
            background: #ffffff !important;
            color: #000000 !important;
            height: 100% !important;
        }
        .ql-editor {
            min-height: 100%;
            background: #ffffff !important;
            color: #000000 !important;
            caret-color: #000000 !important;
            -webkit-text-fill-color: currentColor;
            height: 100% !important;
        }
        .ql-editor * {
            caret-color: #000000 !important;
        }
        .ql-editor::before {
            color: #666666 !important;
        }
        #caret-overlay {
            position: absolute;
            width: 2px;
            background: #111111;
            pointer-events: none;
            user-select: none;
            z-index: 2147483647;
            display: none;
            animation: caret-overlay-blink 1s step-end infinite;
        }
        @keyframes caret-overlay-blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="toolbar-container">
            <span id="toolbar"></span>
        </div>
        <div id="editor-container">
            <div id="editor"></div>
        </div>
    </div>

    <script src="quill.min.js"></script>
    <script src="quill-table-better.js"></script>
    <script>
        function sendToHost(payload) {
            const json = JSON.stringify(payload);

            // Avalonia bridge on many platforms
            if (typeof window.invokeCSharpAction === 'function') {
                window.invokeCSharpAction(json);
                return;
            }

            // WebView2-style bridge fallback
            if (window.chrome && window.chrome.webview && typeof window.chrome.webview.postMessage === 'function') {
                window.chrome.webview.postMessage(json);
                return;
            }

            // WebKit message handler fallback
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.webview
                && typeof window.webkit.messageHandlers.webview.postMessage === 'function') {
                window.webkit.messageHandlers.webview.postMessage(json);
                return;
            }
        }

        // ── Toolbar configuration ──────────────────────────────
        const toolbarOptions = [
            [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'color': [] }, { 'background': [] }],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            [{ 'indent': '-1'}, { 'indent': '+1' }],
            [{ 'align': [] }],
            ['blockquote', 'code-block'],
            ['link', 'image', 'video'],
            ['table-better'],
            ['clean']
        ];

        // ── Register table-better module ─────────────────────
        Quill.register({'modules/table-better': QuillTableBetter}, true);

        // ── Initialize Quill ───────────────────────────────────
        const quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: {
                    container: toolbarOptions,
                    handlers: {}
                },
                table: false,
                'table-better': {
                    language: 'en_US',
                    menus: ['column', 'row', 'merge', 'table', 'cell', 'wrap', 'delete'],
                    toolbarTable: true
                },
                keyboard: {
                    bindings: QuillTableBetter.keyboardBindings
                }
            },
            placeholder: 'Start typing...'
        });

        function enforceCaretVisibility() {
            try {
                document.documentElement.style.setProperty('color-scheme', 'light', 'important');
                quill.root.style.setProperty('caret-color', '#000000', 'important');
                quill.root.style.setProperty('color', '#000000', 'important');
                quill.root.style.setProperty('background-color', '#ffffff', 'important');

                // Ensure the current insertion context also carries caret color.
                var sel = window.getSelection ? window.getSelection() : null;
                if (sel && sel.anchorNode) {
                    var el = sel.anchorNode.nodeType === 1 ? sel.anchorNode : sel.anchorNode.parentElement;
                    if (el && el.style) {
                        el.style.setProperty('caret-color', '#000000', 'important');
                    }
                }
            } catch (e) {
                // Best effort only.
            }
        }

        function normalizeInsertionColorIfInvisible() {
            try {
                var range = quill.getSelection();
                if (!range || range.length !== 0) return;

                var fmt = quill.getFormat(range.index, 0) || {};
                var c = (fmt.color || '').toString().toLowerCase().replace(/\s+/g, '');

                if (
                    c === 'white' ||
                    c === '#fff' ||
                    c === '#ffffff' ||
                    c === 'rgb(255,255,255)' ||
                    c === 'rgba(255,255,255,1)' ||
                    c === 'transparent' ||
                    c === 'rgba(0,0,0,0)'
                ) {
                    quill.format('color', '#000000', Quill.sources.SILENT);
                }
            } catch (e) {
                // Best effort only.
            }
        }

        var _caretOverlay = null;

        function ensureCaretOverlay() {
            if (_caretOverlay && _caretOverlay.parentNode) {
                return _caretOverlay;
            }

            var host = document.getElementById('editor-container');
            if (!host) return null;

            _caretOverlay = document.createElement('div');
            _caretOverlay.id = 'caret-overlay';
            _caretOverlay.setAttribute('aria-hidden', 'true');
            host.appendChild(_caretOverlay);
            return _caretOverlay;
        }

        function hideCaretOverlay() {
            if (_caretOverlay) {
                _caretOverlay.style.display = 'none';
            }
        }

        function updateCaretOverlay() {
            try {
                var overlay = ensureCaretOverlay();
                if (!overlay) return;

                var range = quill.getSelection();
                if (!range || range.length !== 0 || !quill.hasFocus()) {
                    overlay.style.display = 'none';
                    return;
                }

                var bounds = quill.getBounds(range.index, 0);
                if (!bounds) {
                    overlay.style.display = 'none';
                    return;
                }

                var rootRect = quill.root.getBoundingClientRect();
                var host = document.getElementById('editor-container');
                var hostRect = host.getBoundingClientRect();

                var left = (rootRect.left - hostRect.left) + bounds.left;
                var top = (rootRect.top - hostRect.top) + bounds.top - quill.root.scrollTop;

                overlay.style.left = Math.max(0, Math.round(left)) + 'px';
                overlay.style.top = Math.max(0, Math.round(top)) + 'px';
                overlay.style.height = Math.max(14, Math.round(bounds.height || 16)) + 'px';
                overlay.style.display = 'block';
            } catch (e) {
                hideCaretOverlay();
            }
        }

        enforceCaretVisibility();
        ensureCaretOverlay();
        updateCaretOverlay();

        // ── State: remember the Scryber document wrapper for setContent ──
        // When C# sends a full <!doctype html>…</html> template via setContent,
        // we extract just the body content for Quill. The C# side handles
        // re-wrapping body-only HTML back into a full document on save.
        let documentWrapperOpen = "";   // "<!doctype html> … </head>"

        /**
         * Given a full HTML document or a bare body fragment, populate
         * documentWrapperOpen and return only the body-innerHTML suitable
         * for updateContents.
         */
        function extractBodyContent(fullHtml) {
            if (!fullHtml.trim().startsWith("<")) {
                documentWrapperOpen = "";
                return fullHtml;
            }

            const lower = fullHtml.toLowerCase();
            const isFullDoc = lower.includes("<!doctype") || lower.startsWith("<html");

            if (!isFullDoc) {
                documentWrapperOpen = "";
                return fullHtml;
            }

            // Find the closing </head> tag
            const headEndIdx = lower.indexOf("</head>");
            if (headEndIdx > -1) {
                documentWrapperOpen = fullHtml.substring(0, headEndIdx + 7);
            } else {
                const bodyStartIdx = lower.indexOf("<body");
                if (bodyStartIdx > -1) {
                    documentWrapperOpen = fullHtml.substring(0, bodyStartIdx);
                } else {
                    documentWrapperOpen = "";
                    return fullHtml;
                }
            }

            // Extract the body content
            const bodyTagMatch = /<body[^>]*>([\s\S]*)<\/body>/i.exec(fullHtml);
            if (bodyTagMatch && bodyTagMatch[1]) {
                return bodyTagMatch[1].trim();
            }

            // Fallback: everything after </head>, stripped of <body> tags
            const afterHead = fullHtml.substring(headEndIdx + 7);
            const stripped = afterHead.replace(/^<body[\s\S]*?>/i, "").replace(/<\/body>[\s\S]*$/i, "");
            return stripped.trim();
        }

        // ── Guard: suppress content-changed while we're actively setting content ──
        var _isSettingContent = false;

        // ── Message bridge: receive from C# ────────────────────
        window.addEventListener('message', function(event) {
            const msg = event.data;
            if (typeof msg !== 'object' || msg === null) return;

            switch (msg.type) {
                case 'setContent':
                    if (msg.html !== undefined) {
                        var bodyContent = extractBodyContent(msg.html || '');
                        
                        // Prevent the text-change → content-changed → C# → setContent feedback loop.
                        _isSettingContent = true;
                        
                        // Clear the editor, then paste the content.
                        quill.setSelection(0, quill.getLength());
                        quill.deleteText(0, quill.getLength(), Quill.sources.API);
                        quill.clipboard.dangerouslyPasteHTML(0, bodyContent);
                        
                        _isSettingContent = false;
                    }
                    break;

                case 'focus':
                    quill.focus();
                    enforceCaretVisibility();
                    normalizeInsertionColorIfInvisible();
                    setTimeout(updateCaretOverlay, 0);
                    break;

                case 'ready':
                    // Acknowledge readiness
                    sendToHost({
                        type: 'ready',
                        timestamp: Date.now()
                    });
                    break;
            }
        });

        // ── Message bridge: send to C# ─────────────────────────
        // Quill sends body-only HTML; C# re-wraps it into a full document.
        let debounceTimer = null;
        const DEBOUNCE_MS = 300;

        function emitContentChanged() {
            if (_isSettingContent) return;

            // Remove temporary elements before extracting HTML (required by table-better)
            var tbl = quill.getModule('table-better');
            if (tbl && typeof tbl.deleteTableTemporary === 'function') {
                tbl.deleteTableTemporary();
            }

            var rawHtml = quill.container.querySelector('.ql-editor').innerHTML;

            // Strip Quill's own trailing <p><br></p> sentinel and any leading/trailing
            // empty paragraphs so the round-trip to C# stays clean.
            var bodyHtml = stripQuillSentinel(rawHtml);

            var formattedHtml = bodyHtml;
            try {
                formattedHtml = prettyPrintHtml(bodyHtml);
            } catch (e) {
                // Never block content synchronization due to formatting errors.
                formattedHtml = bodyHtml;
            }

            sendToHost({
                type: 'content-changed',
                html: formattedHtml
            });
        }

        function flushPendingChanges() {
            if (debounceTimer) {
                clearTimeout(debounceTimer);
                debounceTimer = null;
            }
            emitContentChanged();
        }

        quill.on('text-change', function(delta, oldDelta, source) {
            if (source === 'api') return; // Ignore programmatic changes
            if (_isSettingContent) return; // Suppress during setContent to avoid feedback loop

            updateCaretOverlay();

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() {
                debounceTimer = null;
                emitContentChanged();
            }, DEBOUNCE_MS);
        });

        // Flush immediately when focus is lost or page visibility changes,
        // otherwise quick tab switches can preserve stale HTML in code view.
        quill.on('selection-change', function(range, oldRange) {
            enforceCaretVisibility();
            normalizeInsertionColorIfInvisible();
            updateCaretOverlay();
            if (range === null && oldRange !== null) {
                flushPendingChanges();
            }
        });
        quill.root.addEventListener('focus', updateCaretOverlay);
        quill.root.addEventListener('keyup', updateCaretOverlay);
        quill.root.addEventListener('mouseup', updateCaretOverlay);
        quill.root.addEventListener('input', updateCaretOverlay);
        quill.root.addEventListener('scroll', updateCaretOverlay);
        quill.root.addEventListener('blur', function() {
            hideCaretOverlay();
            flushPendingChanges();
        });
        window.addEventListener('resize', updateCaretOverlay);
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                hideCaretOverlay();
                flushPendingChanges();
            } else {
                setTimeout(updateCaretOverlay, 0);
            }
        });
        window.addEventListener('beforeunload', flushPendingChanges);

        /**
         * Remove Quill's internal trailing-blank-paragraph sentinel (&lt;p&gt;&lt;br&gt;&lt;/p&gt;)
         * and any other leading/trailing empty paragraphs from the extracted innerHTML.
         */
        function stripQuillSentinel(html) {
            if (!html) return '';
            // Trim outer whitespace.
            html = html.trim();
            // Strip trailing empty paragraphs (may be stacked: <p><br></p><p><br></p>).
            html = html.replace(/\s*<(?:p|P)(?:\s[^>]*)?>\s*(?:&nbsp;)?(?:<br\s*\/?>)?\s*<\/(?:p|P)>\s*$/gi, '');
            // Strip leading empty paragraphs.
            html = html.replace(/^\s*<(?:p|P)(?:\s[^>]*)?>\s*(?:&nbsp;)?(?:<br\s*\/?>)?\s*<\/(?:p|P)>/gi, '');
            return html.trim();
        }
        /**
         * Pretty-print HTML with proper indentation and line breaks.
         * Splits on angle brackets, identifies block-level vs inline tags,
         * and emits indented output.
         */
        function prettyPrintHtml(html) {
            if (!html) return '';
            
            var BLOCK_TAGS = /^(?:div|p|h[1-6]|ul|ol|li|table|thead|tbody|tfoot|tr|td|th|blockquote|pre|dl|dt|dd|section|article|aside|main|nav|header|footer|figure|figcaption)$/i;
            var VOID_TAGS = /^(?:br|hr|img|input|meta|link|area|base|col|embed|param|source|track|wbr)$/i;
            var INDENT_STR = '  ';
            
            // Split into tokens: text segments and tags
            var tokens = [];
            var pos = 0;
            while (pos < html.length) {
                var ltPos = html.indexOf('<', pos);
                if (ltPos === -1) {
                    var text = html.substring(pos).trim();
                    if (text) tokens.push({type: 'text', value: text});
                    break;
                }
                if (ltPos > pos) {
                    var textBefore = html.substring(pos, ltPos).trim();
                    if (textBefore) tokens.push({type: 'text', value: textBefore});
                }
                var gtPos = html.indexOf('>', ltPos);
                if (gtPos === -1) {
                    tokens.push({type: 'tag', value: html.substring(ltPos)});
                    break;
                }
                tokens.push({type: 'tag', value: html.substring(ltPos, gtPos + 1)});
                pos = gtPos + 1;
            }
            
            var depth = 0;
            var lines_out = [];
            var currentLine = '';
            
            function flushLine() {
                if (currentLine) {
                    lines_out.push(currentLine);
                    currentLine = '';
                }
            }
            
            function padStr() {
                return INDENT_STR.repeat(depth);
            }
            
            for (var i = 0; i < tokens.length; i++) {
                var tok = tokens[i];
                if (tok.type === 'text') {
                    currentLine += tok.value;
                    continue;
                }
                var tag = tok.value;
                var trimmed = tag.trim();
                var tagLower = trimmed.toLowerCase();
                var isComment = tagLower.startsWith('<!--');
                var isClosing = tagLower.startsWith('</');
                var isSelfClose = tagLower.endsWith('/>') || VOID_TAGS.test(getTagName(trimmed));
                var tagName = getTagName(trimmed);
                var isBlock = BLOCK_TAGS.test(tagName);
                
                if (isComment) {
                    flushLine();
                    lines_out.push(padStr() + tag);
                    continue;
                }
                if (isClosing) {
                    if (isBlock) {
                        flushLine();
                        depth--;
                        lines_out.push(padStr() + tag);
                    } else {
                        currentLine += tag;
                    }
                } else if (isSelfClose) {
                    if (isBlock) {
                        flushLine();
                        lines_out.push(padStr() + tag);
                    } else {
                        currentLine += tag;
                    }
                } else {
                    if (isBlock) {
                        flushLine();
                        lines_out.push(padStr() + tag);
                        depth++;
                    } else {
                        currentLine += tag;
                    }
                }
            }
            flushLine();
            return lines_out.join('\n').trim();
        }
        
        function getTagName(tag) {
            var m = tag.match(/^<\/?\s*([a-zA-Z][a-zA-Z0-9-]*)/);
            return m ? m[1].toLowerCase() : '';
        }
        // ── Signal ready to host ──────────────────────────────
        sendToHost({
            type: 'initialized',
            version: Quill.version
        });
        // Proactive ready signal to avoid initial ping race on some WebView hosts.
        sendToHost({
            type: 'ready',
            timestamp: Date.now()
        });
    </script>
</body>
</html>
